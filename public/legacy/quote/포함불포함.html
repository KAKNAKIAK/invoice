<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 포함/불포함 내역 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">여행 포함/불포함 내역 관리</h1>
            <p id="currentDocumentNameDisplay" class="text-sm text-gray-500 mt-2">새로운 포함/불포함 내역</p>
        </div>
        
        <div id="statusMessage" class="mb-6 p-4 text-center rounded-md text-sm transition-opacity duration-300 opacity-0"></div>

        <div class="flex flex-col md:flex-row md:space-x-8 space-y-6 md:space-y-0">
            <div class="flex-1">
                <label for="inclusions" class="block text-lg font-medium text-gray-700 mb-2">✅ 포함내역</label>
                <textarea id="inclusions" rows="12" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"></textarea>
            </div>
            <div class="flex-1">
                <label for="exclusions" class="block text-lg font-medium text-gray-700 mb-2">❌ 불포함내역</label>
                <textarea id="exclusions" rows="12" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition"></textarea>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-4">
            <button id="saveButton" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors duration-300 shadow-md">💾 저장</button>
            <button id="saveAsNewButton" class="bg-green-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-green-700 transition-colors duration-300 shadow-md">✨ 다른 이름으로 저장</button>
            <button id="loadButton" class="bg-gray-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-gray-700 transition-colors duration-300 shadow-md">🔄 불러오기</button>
        </div>
    </div>

    <!-- 불러오기 모달 -->
    <div id="loadModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="p-5 border-b flex justify-between items-center">
                <h3 class="text-lg font-medium">저장된 내역 불러오기</h3>
                <button id="closeLoadModalButton" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <div class="p-5">
                <input type="text" id="searchSetInput" placeholder="이름으로 검색..." class="w-full px-3 py-2 border border-gray-300 rounded-md mb-4">
                <div id="loadingMessage" class="text-center text-gray-500 p-4">목록을 불러오는 중...</div>
                <ul id="setList" class="max-h-64 overflow-y-auto divide-y">
                    <!-- 저장된 목록이 여기에 동적으로 추가됩니다 -->
                </ul>
            </div>
            <div class="p-4 bg-gray-50 border-t text-right">
                <button id="cancelLoadModalButton" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">취소</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, addDoc, getDocs, deleteDoc, serverTimestamp, orderBy, query } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-analytics.js";

        // Firebase 설정 (기존 memo-1-e9ee8 사용)
        const firebaseConfig = {
            apiKey: "AIzaSyC7eXBtNczq0ylN5UZNyZaMUH3M-6Gicvc",
            authDomain: "memo-1-e9ee8.firebaseapp.com",
            projectId: "memo-1-e9ee8",
            storageBucket: "memo-1-e9ee8.appspot.com",
            messagingSenderId: "787316238134",
            appId: "1:787316238134:web:20b136703e76ff3de67597",
            measurementId: "G-WGB4VSG0MP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        // 전역 상태 변수
        let currentDocumentId = null;
        let currentDocumentName = "새로운 포함/불포함 내역";
        let allFetchedSets = [];

        // DOM 요소
        const inclusionsText = document.getElementById('inclusions');
        const exclusionsText = document.getElementById('exclusions');
        const saveButton = document.getElementById('saveButton');
        const saveAsNewButton = document.getElementById('saveAsNewButton');
        const loadButton = document.getElementById('loadButton');
        const statusMessage = document.getElementById('statusMessage');
        const currentDocumentNameDisplay = document.getElementById('currentDocumentNameDisplay');
        
        // 모달 DOM 요소
        const loadModal = document.getElementById('loadModal');
        const searchSetInput = document.getElementById('searchSetInput');
        const loadingMessage = document.getElementById('loadingMessage');
        const setList = document.getElementById('setList');
        const closeLoadModalButton = document.getElementById('closeLoadModalButton');
        const cancelLoadModalButton = document.getElementById('cancelLoadModalButton');

        /** 상태 메시지 표시 함수 */
        function showStatus(message, isError = false) {
            statusMessage.textContent = message;
            statusMessage.className = `mb-6 p-4 text-center rounded-md text-sm transition-opacity duration-300 ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            statusMessage.style.opacity = 1;
            setTimeout(() => { statusMessage.style.opacity = 0; }, 3000);
        }

        /** 현재 문서 이름 표시 업데이트 */
        function renderHeader() {
            currentDocumentNameDisplay.textContent = currentDocumentName;
        }

        /**
         * Firestore에 데이터 저장 (저장 / 다른 이름으로 저장)
         * @param {boolean} isSaveAsNew - '다른 이름으로 저장' 여부
         */
        async function saveData(isSaveAsNew = false) {
            let docName = currentDocumentName;

            if (isSaveAsNew || !currentDocumentId) {
                const newName = prompt("이 내역을 어떤 이름으로 저장하시겠습니까?", docName === "새로운 포함/불포함 내역" ? "나의 첫 여행 내역" : docName);
                if (!newName || newName.trim() === "") {
                    showStatus("이름이 없어 저장이 취소되었습니다.", true);
                    return;
                }
                docName = newName.trim();
            }

            const dataToSave = {
                name: docName,
                inclusions: inclusionsText.value,
                exclusions: exclusionsText.value,
                timestamp: serverTimestamp()
            };

            try {
                if (currentDocumentId && !isSaveAsNew) {
                    await setDoc(doc(db, "inclusionsExclusions", currentDocumentId), dataToSave);
                    showStatus(`'${docName}'이(가) 업데이트되었습니다.`);
                } else {
                    const docRef = await addDoc(collection(db, "inclusionsExclusions"), dataToSave);
                    currentDocumentId = docRef.id;
                    showStatus(`'${docName}'이(가) 새롭게 저장되었습니다.`);
                }
                currentDocumentName = docName;
                renderHeader();
            } catch (error) {
                console.error("저장 오류:", error);
                showStatus(`저장 중 오류 발생: ${error.message}`, true);
            }
        }

        /** 불러오기 모달 열기 */
        async function openLoadModal() {
            loadModal.classList.remove('hidden');
            loadingMessage.style.display = 'block';
            setList.innerHTML = '';
            searchSetInput.value = '';
            allFetchedSets = [];

            try {
                const q = query(collection(db, "inclusionsExclusions"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach((doc) => {
                    allFetchedSets.push({ id: doc.id, ...doc.data() });
                });
                renderSetList();
            } catch (error) {
                console.error("목록 불러오기 오류:", error);
                loadingMessage.textContent = "목록을 불러오는 중 오류가 발생했습니다.";
            } finally {
                loadingMessage.style.display = 'none';
            }
        }
        
        /** 불러오기 모달 목록 렌더링 */
        function renderSetList() {
            setList.innerHTML = '';
            const searchTerm = searchSetInput.value.toLowerCase();
            const filteredSets = allFetchedSets.filter(s => s.name.toLowerCase().includes(searchTerm));

            if (filteredSets.length === 0) {
                setList.innerHTML = `<li class="p-3 text-center text-gray-500">표시할 내역이 없습니다.</li>`;
                return;
            }

            filteredSets.forEach(s => {
                const listItem = document.createElement('li');
                listItem.className = 'flex justify-between items-center p-3 hover:bg-gray-100 cursor-pointer';
                listItem.innerHTML = `
                    <span class="font-medium text-gray-800">${s.name}</span>
                    <button data-id="${s.id}" data-name="${s.name}" class="delete-btn p-1 text-gray-400 hover:text-red-600">&times;</button>
                `;
                listItem.addEventListener('click', () => loadData(s.id));
                setList.appendChild(listItem);
            });
        }
        
        /** 특정 문서 데이터 불러오기 */
        async function loadData(docId) {
            try {
                const docRef = doc(db, "inclusionsExclusions", docId);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    inclusionsText.value = data.inclusions || '';
                    exclusionsText.value = data.exclusions || '';
                    currentDocumentId = docSnap.id;
                    currentDocumentName = data.name;
                    renderHeader();
                    loadModal.classList.add('hidden');
                    showStatus(`'${data.name}'을(를) 불러왔습니다.`);
                } else {
                    showStatus("해당 문서를 찾을 수 없습니다.", true);
                }
            } catch (error) {
                console.error("데이터 로드 오류:", error);
                showStatus(`데이터 로딩 중 오류 발생: ${error.message}`, true);
            }
        }

        /** 데이터 삭제 */
        async function deleteData(docId, docName) {
            if (!confirm(`'${docName}'을(를) 정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;

            try {
                await deleteDoc(doc(db, "inclusionsExclusions", docId));
                showStatus(`'${docName}'이(가) 삭제되었습니다.`);
                
                // 로컬 목록에서도 제거
                allFetchedSets = allFetchedSets.filter(s => s.id !== docId);
                renderSetList();

                // 현재 작업중인 문서가 삭제된 경우 초기화
                if (currentDocumentId === docId) {
                    inclusionsText.value = '';
                    exclusionsText.value = '';
                    currentDocumentId = null;
                    currentDocumentName = "새로운 포함/불포함 내역";
                    renderHeader();
                }

            } catch (error) {
                console.error("삭제 오류:", error);
                showStatus(`삭제 중 오류 발생: ${error.message}`, true);
            }
        }

        // 초기 이벤트 리스너 설정
        saveButton.addEventListener('click', () => saveData(false));
        saveAsNewButton.addEventListener('click', () => saveData(true));
        loadButton.addEventListener('click', openLoadModal);
        
        // 모달 관련 이벤트 리스너
        closeLoadModalButton.addEventListener('click', () => loadModal.classList.add('hidden'));
        cancelLoadModalButton.addEventListener('click', () => loadModal.classList.add('hidden'));
        searchSetInput.addEventListener('input', renderSetList);

        // 이벤트 위임을 사용하여 삭제 버튼 처리
        setList.addEventListener('click', (e) => {
            if (e.target && e.target.closest('.delete-btn')) {
                e.stopPropagation(); // 부모 li의 클릭 이벤트 방지
                const button = e.target.closest('.delete-btn');
                const id = button.dataset.id;
                const name = button.dataset.name;
                deleteData(id, name);
            }
        });

        // 초기 헤더 렌더링
        renderHeader();
    </script>
</body>
</html>
